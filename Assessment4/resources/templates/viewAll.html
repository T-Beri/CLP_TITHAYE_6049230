<html>
<style>
	table {
	        border-collapse: collapse;  
	    }
    th {
        background-color: red;
        color: black;
    }
	

    td {
        background-color: aqua;
    }
</style>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Salary</th>
        <th>DOJ</th>
        <th>Dept</th>
        <th>Actions</th>
    </tr>

    <tr th:each="e : ${emps}">
        <td th:text="${e.empId}"></td>
        <td th:text="${e.empName}"></td>
        <td th:text="${e.empSal}"></td>
        <td th:text="${e.empDoj}"></td>
        <td th:text="${e.deptName}"></td>

        <td>
            <a th:href="@{/edit/{id}(id=${e.empId})}">Edit</a>
            <a th:href="@{/delete/{id}(id=${e.empId})}">Delete</a>
        </td>
    </tr>
</table>
</html>
